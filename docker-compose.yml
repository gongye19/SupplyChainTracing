services:
  db:
    image: postgres:16
    container_name: supplychain_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: supplychain
    ports:
      - "5433:5432"
    volumes:
      - supplychain-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplychain-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplychain_backend
    restart: unless-stopped
    ports:
      - "8001:8000"  # 使用8001端口避免冲突
    environment:
      DATABASE_URL: postgresql://postgres:123456@db:5432/supplychain
      CORS_ORIGINS: http://localhost:3001
      CHAT_MODEL_ENABLED: ${CHAT_MODEL_ENABLED:-false}
      CHAT_MODEL_BASE_URL: ${CHAT_MODEL_BASE_URL:-}
      CHAT_MODEL_NAME: ${CHAT_MODEL_NAME:-}
      CHAT_MODEL_API_KEY: ${CHAT_MODEL_API_KEY:-}
      CHAT_MODEL_TIMEOUT_SECONDS: ${CHAT_MODEL_TIMEOUT_SECONDS:-90}
      CHAT_MODEL_MAX_CONCURRENCY: ${CHAT_MODEL_MAX_CONCURRENCY:-1}
      CHAT_MODEL_QUEUE_TIMEOUT_SECONDS: ${CHAT_MODEL_QUEUE_TIMEOUT_SECONDS:-5}
      CHAT_JOBS_ENABLED: ${CHAT_JOBS_ENABLED:-false}
      CHAT_WORKER_TOKEN: ${CHAT_WORKER_TOKEN:-}
      INSIGHT_JOBS_ENABLED: ${INSIGHT_JOBS_ENABLED:-false}
      DEFAULT_DATASET_VERSION: ${DEFAULT_DATASET_VERSION:-}
      INSIGHT_WORKER_TOKEN: ${INSIGHT_WORKER_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    networks:
      - supplychain-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplychain_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"  # 使用3001端口避免冲突
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - supplychain-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: supplychain_pgadmin
    restart: unless-stopped
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - supplychain-pgadmin-data:/var/lib/pgadmin
    networks:
      - supplychain-network

networks:
  supplychain-network:
    driver: bridge

volumes:
  supplychain-postgres-data:
  supplychain-pgadmin-data:
